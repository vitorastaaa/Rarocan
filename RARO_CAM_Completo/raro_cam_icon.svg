<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a84ff"/>
      <stop offset="50%" style="stop-color:#5e5ce6"/>
      <stop offset="100%" style="stop-color:#bf5af2"/>
    </linearGradient>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Fundo arredondado -->
  <rect x="32" y="112" width="448" height="288" rx="48" fill="url(#iconGradient)" filter="url(#iconGlow)"/>
  <!-- Lente da câmera -->
  <circle cx="256" cy="256" r="80" fill="#1c1c1e" stroke="#fff" stroke-width="8"/>
  <circle cx="256" cy="256" r="56" fill="#2c2c2e" stroke="#0a84ff" stroke-width="4"/>
  <circle cx="256" cy="256" r="32" fill="#0a84ff" opacity="0.6"/>
  <!-- Flash -->
  <circle cx="400" cy="160" r="16" fill="#fff" opacity="0.9"/>
  <!-- Botão de gravação -->
  <rect x="200" y="80" width="112" height="32" rx="16" fill="url(#iconGradient)"/>
</svg>